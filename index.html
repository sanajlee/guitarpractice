<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3분 연습</title>

  <link rel="stylesheet" href="css/styles.css">

  <link rel="apple-touch-icon" href="yrds_gpt.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="3분연습">

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#244f7a">
  <link rel="icon" href="yrds_gpt.png">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div id="loginScreen" class="login-screen">
    <div class="card">
      <h1>🎸 3분 연습</h1>

      <div id="authHome">
        <button id="showLoginButton">로그인</button>
        <button id="showSignupButton" class="secondary">회원가입</button>
        <button id="guestButton" class="secondary">게스트로 시작</button>
      </div>

      <div id="loginForm" class="hidden">
        <h3>로그인</h3>
        <input id="loginEmail" type="email" placeholder="email">
        <input id="loginPassword" type="password" placeholder="password">
        <button id="signInButton">로그인</button>
        <button class="secondary back-auth-button">뒤로</button>
      </div>

      <div id="signupForm" class="hidden">
        <h3>회원가입</h3>
        <input id="signupEmail" type="email" placeholder="email">
        <input id="signupPassword" type="password" placeholder="password">
        <button id="signUpButton">회원가입</button>
        <button class="secondary back-auth-button">뒤로</button>
      </div>

      <p id="loginMessage" class="muted"></p>
    </div>
  </div>

  <div id="appScreen" class="app hidden">
    <button id="userButton" class="user-button">
      <img id="topAvatar" class="top-avatar" src="yrds_gpt.png" alt="">
      <span id="topNickname">me</span>
    </button>

    <h1>🎸 3분 연습</h1>

  <div id="practiceView">
    <div class="card">
      <div id="timer">03:00</div>
      <button id="startButton">Start</button>
      <button id="pauseButton" class="secondary">Pause</button>
      <button id="resetButton" class="secondary">Reset</button>
    </div>

    <div class="tool-carousel">
      <div class="tool-card">
        <h3>메트로놈</h3>
        <p class="tool-hint">옆으로 넘기면 튜너</p>

        BPM: <span id="bpmValue">80</span>
        <input type="range" id="bpm" min="40" max="220" value="80"/>

        <select id="subdivision">
          <option value="1">4분음표</option>
          <option value="2">8분음표</option>
          <option value="4">16분음표</option>
        </select>

        <button id="metroButton">Metronome</button>
        <div class="beats" id="beats"></div>
      </div>

      <div class="tool-card">
        <h3>튜닝 기준음</h3>
        <p class="tool-hint">낮은 줄 → 높은 줄</p>

        <div class="tuner-grid">
          <button class="tuner-button" data-note="82.41">6번 미<br>E2</button>
          <button class="tuner-button" data-note="110.00">5번 라<br>A2</button>
          <button class="tuner-button" data-note="146.83">4번 레<br>D3</button>
          <button class="tuner-button" data-note="196.00">3번 솔<br>G3</button>
          <button class="tuner-button" data-note="246.94">2번 시<br>B3</button>
          <button class="tuner-button" data-note="329.63">1번 미<br>E4</button>
        </div>
      </div>
    </div>
  </div>

  <div id="recordView" class="hidden">
    <button id="backToPracticeButton" class="secondary">← 연습 화면으로</button>

    <div class="card stats">
      <div class="stat">
        <div class="stat-number" id="today">0</div>
        오늘
      </div>
      <div class="stat">
        <div class="stat-number" id="streak">0</div>
        streak
      </div>
    </div>

    <div class="card">
      <h3>오늘 채운 칸</h3>
      <div class="grid" id="grid"></div>
    </div>

    <div class="card">
      <h3>최근 10일 그래프</h3>
      <div class="chart" id="chart"></div>
    </div>

    <div class="card">
      <button id="deleteTodayButton" class="danger">오늘 기록 삭제</button>
    </div>
  </div>

  <div id="overlay" class="overlay hidden"></div>

    <aside id="sideMenu" class="side-menu">
      <button id="closeSideMenuButton" class="secondary">닫기</button>

      <div class="side-profile-view">
        <img id="profilePreview" class="profile-preview" src="yrds_gpt.png" alt="">

        <div class="profile-text">
          <div id="sideNickname" class="side-nickname">me</div>
        </div>

        <button id="editProfileButton" class="icon-button">✏️</button>
      </div>

      <div id="profileEditForm" class="profile-edit-form hidden">
        <input id="nicknameInput" type="text" placeholder="nickname">
        <input id="avatarInput" type="file" accept="image/*">
        <button id="saveProfileButton">저장</button>
        <button id="cancelProfileEditButton" class="secondary">취소</button>
      </div>

      <hr>

      <div class="side-menu-buttons">
        <button id="showMyRecordButton">내 기록</button>
        <button id="signOutButton" class="danger">로그아웃</button>
      </div>
    </aside>

  <script type="module" src="js/app.js"></script>
</body>
</html>
